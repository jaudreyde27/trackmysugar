services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackmysugar
      POSTGRES_PASSWORD: trackmysugar_dev_only
      POSTGRES_DB: trackmysugar
    ports:
      - "5432:5432"
    volumes:
      - trackmysugar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackmysugar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trackmysugar_db_data:
